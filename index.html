<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>UroLog Pro - Dr. Kunal Borade</title>
    <style>
        :root { --primary: #1a73e8; --bg: #f8f9fa; --text: #202124; --danger: #d93025; --success: #188038; }
        body { font-family: 'Google Sans', Arial, sans-serif; background: var(--bg); margin: 0; padding-bottom: 80px; }
        .blue-header { background: var(--primary); color: white; padding: 25px 15px; border-radius: 0 0 20px 20px; position: sticky; top: 0; z-index: 100; }
        .card { background: white; margin: 12px; padding: 15px; border-radius: 12px; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        .input-box { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #dadce0; border-radius: 8px; box-sizing: border-box; }
        .btn-main { width: 100%; background: var(--primary); color: white; border: none; padding: 14px; border-radius: 8px; font-weight: bold; }
        .pt-card { background: white; margin: 10px 12px; padding: 15px; border-radius: 10px; border-left: 5px solid #ccc; position: relative; }
        .pt-card.pending { border-left-color: var(--danger); }
        .pt-card.paid { border-left-color: var(--success); }
        .wa-btn { background: #25D366; color: white; border: none; padding: 5px 10px; border-radius: 15px; font-size: 12px; text-decoration: none; margin-left: 8px; }
        #sync-bar { position: fixed; top: 0; left: 0; width: 0%; height: 4px; background: #34a853; transition: 0.3s; z-index: 1001; }
    </style>
</head>
<body>

<div id="sync-bar"></div>

<div class="blue-header">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <div><strong>Dr. Kunal Borade</strong><br><small id="status">Cloud Ready</small></div>
        <div>
            <button onclick="setCloudUrl()" style="background:none; border:none; color:white; font-size:20px;">☁️</button>
            <button onclick="syncNow()" style="background:none; border:none; color:white; font-size:20px; margin-left:15px;">🔄</button>
        </div>
    </div>
    <input type="text" id="search" class="input-box" placeholder="🔍 Search patients..." onkeyup="render()" style="margin-top:15px; border:none;">
</div>

<div class="card">
    <input type="hidden" id="edit-id">
    <input type="text" id="name" class="input-box" placeholder="Patient Name *">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <input type="number" id="age" class="input-box" placeholder="Age">
        <select id="sex" class="input-box"><option>Male</option><option>Female</option></select>
    </div>
    <input type="text" id="diag" class="input-box" placeholder="Diagnosis">
    <input type="text" id="surgery" class="input-box" placeholder="Surgery">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
        <input type="number" id="said" class="input-box" placeholder="Amount Said" oninput="calc()">
        <input type="number" id="rec" class="input-box" placeholder="Received" oninput="calc()">
    </div>
    <input type="number" id="pend" class="input-box" placeholder="Pending" readonly style="background:#eee">
    <button class="btn-main" onclick="save()">💾 SAVE RECORD</button>
</div>

<div id="list"></div>

<script>
    let patients = JSON.parse(localStorage.getItem('uro_data') || '[]');
    let cloudUrl = localStorage.getItem('uro_url') || '';

    function calc() {
        let s = Number(document.getElementById('said').value) || 0;
        let r = Number(document.getElementById('rec').value) || 0;
        document.getElementById('pend').value = s - r;
    }

    function save() {
        let p = {
            id: document.getElementById('edit-id').value || Date.now().toString(),
            name: document.getElementById('name').value,
            age: document.getElementById('age').value,
            sex: document.getElementById('sex').value,
            diag: document.getElementById('diag').value,
            surgery: document.getElementById('surgery').value,
            said: document.getElementById('said').value,
            rec: document.getElementById('rec').value,
            pend: document.getElementById('pend').value,
            ts: new Date().toISOString()
        };
        if(!p.name) return alert("Name required");
        let idx = patients.findIndex(x => x.id === p.id);
        if(idx > -1) patients[idx] = p; else patients.unshift(p);
        localStorage.setItem('uro_data', JSON.stringify(patients));
        render();
        if(cloudUrl) cloudRequest('save', p);
    }

    function cloudRequest(action, data) {
        let params = new URLSearchParams({action, ...data});
        let script = document.createElement('script');
        script.src = `${cloudUrl}?${params.toString()}&callback=cloudCallback`;
        document.body.appendChild(script);
    }

    window.cloudCallback = (res) => {
        document.getElementById('sync-bar').style.width = '0%';
        if(res.data) {
            patients = res.data;
            localStorage.setItem('uro_data', JSON.stringify(patients));
            render();
        }
    };

    function syncNow() {
        if(!cloudUrl) return alert("Set Cloud URL");
        document.getElementById('sync-bar').style.width = '100%';
        cloudRequest('fetch', {});
    }

    function setCloudUrl() {
        let url = prompt("Paste Apps Script URL:", cloudUrl);
        if(url) { localStorage.setItem('uro_url', url); cloudUrl = url; location.reload(); }
    }

    function render() {
        let q = document.getElementById('search').value.toLowerCase();
        document.getElementById('list').innerHTML = patients.filter(p => p.name.toLowerCase().includes(q)).map(p => `
            <div class="pt-card ${p.pend > 0 ? 'pending' : 'paid'}">
                <strong>${p.name}</strong> (${p.age}${p.sex[0]})
                <div style="font-size:13px; color:#666;">${p.diag} | ${p.surgery}</div>
                <div style="font-weight:bold; color:${p.pend > 0 ? 'red' : 'green'}">Pending: ₹${p.pend}</div>
                <button onclick="editPt('${p.id}')" style="margin-top:10px; border:none; background:#eee; padding:5px 10px; border-radius:5px;">Edit</button>
            </div>
        `).join('');
    }

    function editPt(id) {
        let p = patients.find(x => x.id === id);
        document.getElementById('edit-id').value = p.id;
        document.getElementById('name').value = p.name;
        document.getElementById('age').value = p.age;
        document.getElementById('said').value = p.said;
        document.getElementById('rec').value = p.rec;
        document.getElementById('pend').value = p.pend;
        window.scrollTo(0,0);
    }

    render();
</script>
</body>
</html>
